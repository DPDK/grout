---
name: Publish

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  check:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/check.yml

  package:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/package.yml

  upload:
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-24.04
    needs:
      - check
      - package
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-packages"
          merge-multiple: true
      - run: |
          rpm -qp --queryformat 'grout=%{VERSION}\n' grout.*.rpm >> $GITHUB_OUTPUT
          rpm -qp --queryformat 'frr=%{VERSION}\n' frr.*.rpm >> $GITHUB_OUTPUT
        id: version
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}
      - uses: docker/metadata-action@v6
        name: Extract metadata for the Docker image
        id: meta-grout
        with:
          images: "quay.io/${{ vars.REGISTRY_NAMESPACE || 'grout' }}/grout"
          tags: |
              type=edge,branch=main
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
          labels: |
            frr_version=${{steps.version.outputs.frr}}
            grout_version=${{steps.version.outputs.grout}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-grout.outputs.tags }}
          labels: ${{ steps.meta-grout.outputs.labels }}
          push: true
      - uses: pyTooling/Actions/releaser@r7
        with:
          token: ${{ github.token }}
          tag: "edge"
          files: |
            *.rpm
            *.*deb
